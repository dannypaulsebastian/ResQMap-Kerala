server.port=${PORT:8080}

# Database Configuration (MySQL)
# Falls back to local values for dev; Railway/Render will inject real ones via env vars
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/resqmap?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging — DEBUG SQL logging is noisy and slightly slower; fine for dev, turn off in prod
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.web=INFO

app.frontend.url=${FRONTEND_URL:http://localhost:3000}